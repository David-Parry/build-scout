            buildArgs.add("-H:+PrintClassInitialization")
            buildArgs.add("-H:Log=registerResource:3")  // Verbose resource registration
            buildArgs.add("-H:+PrintAnalysisStatistics")


            useFatJar = true  // Uses shadowJar
        }
    }
