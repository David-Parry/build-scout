nativeCompile.dependsOn shadowJar

tasks.named('distZip').configure { enabled = false }
tasks.named('distTar').configure { enabled = false }
// Make the shadowJar task run when the build task runs
build {
    dependsOn shadowJar
}

tasks.named('distZip') {
    dependsOn shadowJar
}

tasks.named('distTar') {
    dependsOn shadowJar
}

tasks.named('startScripts') {
    dependsOn shadowJar
}

tasks.named('nativeCompileClasspathJar') {
    dependsOn tasks.named('shadowJar')
}

tasks.named('generateResourcesConfigFile') {
    dependsOn tasks.named('shadowJar')
}


tasks.register('prebuild') {
    group = 'build'
    description = 'Increments version and then runs build with updated version.'

    doFirst {
        // Execute incrementVersion task directly
        tasks.incrementVersion.actions.each { action ->
            action.execute(tasks.incrementVersion)
        }
    }

    finalizedBy build
}

