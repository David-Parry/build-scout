            buildArgs.add('--initialize-at-run-time=com.davidparry.scout.annotation')
            buildArgs.add('--initialize-at-run-time=com.davidparry.scout.common')
            buildArgs.add('--initialize-at-run-time=com.davidparry.scout.tools')
            buildArgs.add('--initialize-at-run-time=com.davidparry.scout.handlers')
