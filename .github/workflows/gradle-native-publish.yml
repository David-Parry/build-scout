name: Build Native Image with GraalVM (Multi-Platform)

on:
  push:
    branches: [trunk]
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  pull_request:
    branches: [trunk]

jobs:
  build-native-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          version: '21'
          java-version: '21'
          distribution: 'graalvm'
          native-image: true
          set-java-home: true

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build native image
        run: ./gradlew nativeCompile

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: scout-win
          path: build/native/nativeCompile/scout.exe
          retention-days: 1

  build-native-macos:
    runs-on: macos-14  # Apple Silicon (M1/M2) runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          version: '21'
          java-version: '21'
          distribution: 'graalvm'
          native-image: true
          set-java-home: true

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v3

      - name: Grant execute permissions for Gradle wrapper
        run: chmod +x gradlew

      - name: Build native image
        run: ./gradlew nativeCompile

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: scout-mac
          path: build/native/nativeCompile/scout
          retention-days: 1

  build-native-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          version: '21'
          java-version: '21'
          distribution: 'graalvm'
          native-image: true
          set-java-home: true

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v3

      - name: Grant execute permissions for Gradle wrapper
        run: chmod +x gradlew

      - name: Build native image
        run: ./gradlew nativeCompile

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: scout-lin
          path: build/native/nativeCompile/scout
          retention-days: 1

  release:
    needs: [build-native-windows, build-native-macos, build-native-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')  # Only run on version tags

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Rename files with platform suffix
          mv artifacts/scout-win/scout.exe release/scout-windows.exe
          mv artifacts/scout-mac/scout release/scout-macos
          mv artifacts/scout-lin/scout release/scout-linux
          
          # Make executables executable
          chmod +x release/scout-macos
          chmod +x release/scout-linux
          
          # Create checksums
          cd release
          sha256sum scout-windows.exe scout-macos scout-linux > checksums.tx
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/scout-windows.exe
            release/scout-macos
            release/scout-linux
            release/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
