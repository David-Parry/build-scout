name: Build Native Image with GraalVM (Multi-Platform)

on:
  push:
    branches: [trunk]
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  pull_request:
    branches: [trunk]

jobs:
  build-native-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          version: '21'
          java-version: '21'
          distribution: 'graalvm'
          native-image: true
          set-java-home: true
      
      - name: Set up Gradle
        uses: gradle/gradle-build-action@v3
      
      - name: Build native image
        run: ./gradlew nativeCompile
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: scout-windows
          path: build/native/nativeCompile/scout.exe
          retention-days: 1

  build-native-macos:
    runs-on: macos-14  # Apple Silicon (M1/M2) runner
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          version: '21'
          java-version: '21'
          distribution: 'graalvm'
          native-image: true
          set-java-home: true
      
      - name: Set up Gradle
        uses: gradle/gradle-build-action@v3
      
      - name: Grant execute permissions for Gradle wrapper
        run: chmod +x gradlew
      
      - name: Build native image
        run: ./gradlew nativeCompile
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: scout-macos
          path: build/native/nativeCompile/scout
          retention-days: 1

  build-native-linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          version: '21'
          java-version: '21'
          distribution: 'graalvm'
          native-image: true
          set-java-home: true
      
      - name: Set up Gradle
        uses: gradle/gradle-build-action@v3
      
      - name: Grant execute permissions for Gradle wrapper
        run: chmod +x gradlew
      
      - name: Build native image
        run: ./gradlew nativeCompile
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: scout-linux
          path: build/native/nativeCompile/scout
          retention-days: 1

  release:
    needs: [build-native-windows, build-native-macos, build-native-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')  # Only run on version tags
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Prepare release assets
        run: |
          # Rename files with platform suffix
          mv artifacts/scout-windows/scout.exe artifacts/scout-windows.exe
          mv artifacts/scout-macos/scout artifacts/scout-macos
          mv artifacts/scout-linux/scout artifacts/scout-linux
          
          # Make executables executable
          chmod +x artifacts/scout-macos
          chmod +x artifacts/scout-linux
          
          # Create checksums
          cd artifacts
          sha256sum scout-* > checksums.txt
          cd ..
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/scout-windows.exe
            artifacts/scout-macos
            artifacts/scout-linux
            artifacts/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
